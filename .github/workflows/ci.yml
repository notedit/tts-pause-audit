name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install lightweight deps
        # The tests don't need torch / transformers / qwen-asr — only the
        # pure-Python modules. Install just what they touch.
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy soundfile openai pytest ruff
      - name: Lint (ruff)
        run: ruff check pause_detector tests
      - name: Run tests
        # Make the test runner avoid importing heavyweight tools/__init__.py.
        run: PYTHONPATH=. pytest tests -q
